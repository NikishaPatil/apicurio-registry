name: Sync Upstream Main Workflow

on:
  schedule:
    - cron: "30 5 * * *"   # 11:00 AM IST (05:30 UTC) daily
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/apicurio/apicurio-registry.git || true
          git fetch origin
          git fetch upstream

      - name: Checkout main branch
        run: git checkout main

      - name: Check if upstream has new commits
        id: check
        run: |
          if git merge-base --is-ancestor upstream/main main; then
            echo "sync_needed=false" >> $GITHUB_OUTPUT
          else
            echo "sync_needed=true" >> $GITHUB_OUTPUT
          fi

      - name: Merge upstream into fork (preserve history)
        if: steps.check.outputs.sync_needed == 'true'
        run: |
          # Ensure latest fork state
          git pull origin main

          # Merge upstream without rebasing
          git merge upstream/main --no-edit

          # Push updated fork
          git push origin main
