name: Sync Upstream Main Workflow

on:
  schedule:
    - cron: "30 5 * * *"   # 11:00 AM IST (05:30 UTC) daily
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # required for rebase

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Add upstream repository
        run: |
          git remote add upstream https://github.com/apicurio/apicurio-registry.git || true
          git fetch upstream
          git fetch origin

      - name: Check if sync is needed
        id: check
        run: |
          git checkout main

          LOCAL=$(git rev-parse main)
          UPSTREAM=$(git rev-parse upstream/main)

          echo "Local main: $LOCAL"
          echo "Upstream main: $UPSTREAM"

          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "No updates found. Skipping sync."
            echo "sync_needed=false" >> $GITHUB_OUTPUT
          else
            echo "Updates found. Sync required."
            echo "sync_needed=true" >> $GITHUB_OUTPUT
          fi

      - name: Sync main branch (safe rebase)
        if: steps.check.outputs.sync_needed == 'true'
        run: |
          git checkout main

          # Make sure local includes latest fork commits (SAFE — no loss)
          git pull origin main --rebase

          # Rebase fork onto upstream
          git pull upstream main --rebase

          # Push rewritten history safely
          git push origin main --force-with-lease
