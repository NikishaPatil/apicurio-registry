name: Downstream Release Automation

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  downstream-release:
    runs-on: ubuntu-22.04

    env:
      UPSTREAM_REPO: https://github.com/Apicurio/apicurio-registry.git
      BRANDING_BRANCH: rhboar-branding

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "apicurio-sync-bot"
          git config user.email "apicurio-sync-bot@users.noreply.github.com"

      - name: Add upstream and fetch tags
        run: |
          git remote add upstream "${UPSTREAM_REPO}" || true
          git fetch upstream --tags

      - name: Determine latest upstream tag
        id: latest
        run: |
          LATEST_TAG=$(git tag -l --sort=-v:refname | head -n 1)
          echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
          echo "Latest upstream tag: $LATEST_TAG"

      - name: Create downstream branch and apply branding
        run: |
          TAG="${{ steps.latest.outputs.latest_tag }}"
          BRANCH="${TAG}-redhat"

          # Fetch branding branch
          git fetch origin "${BRANDING_BRANCH}"
          BRANDING_COMMIT=$(git rev-parse "origin/${BRANDING_BRANCH}")

          if git ls-remote --exit-code --heads origin "$BRANCH"; then
            echo "Branch $BRANCH already exists. Checking for branding changes..."

            git fetch origin "$BRANCH"
            # Check if branding commit message is already present on the branch
            if git log "origin/${BRANCH}" --grep="$(git log -1 --format='%s' "${BRANDING_COMMIT}")" --oneline | grep -q .; then
              echo "Downstream release branch $BRANCH is up to date and applied with branding changes."
              exit 0
            fi

            # Branding not applied yet — apply it
            echo "Branding changes not found on $BRANCH. Applying..."
            git checkout -b "$BRANCH" "origin/${BRANCH}"
            git cherry-pick "${BRANDING_COMMIT}"
            git push origin "$BRANCH"
          else
            # Create new branch from upstream tag and apply branding
            echo "Creating downstream branch $BRANCH from tag $TAG..."
            git checkout -b "$BRANCH" "refs/tags/$TAG"
            git cherry-pick "${BRANDING_COMMIT}"
            git push origin "$BRANCH"
          fi
